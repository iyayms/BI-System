<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meryenda | Stocks</title>
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="../css/products.css"> <link rel="stylesheet" href="../css/stocks.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script defer src="../js/stocks.js"></script>
</head>
<body>
    <div class="layout">
        <div id="sidebar-container"></div>

        <main class="products-container">
            <header class="products-title-section">
                <h1>Stocks</h1>
                <p class="description-text">Track your stocks, add ingredient, stocks and remove items</p>
            </header>

            <div class="controls-row">
                <div class="search-bar-container">
                    <i class="ph ph-magnifying-glass"></i>
                    <input type="text" id="stockSearch" placeholder="Search products">
                </div>
                <div class="action-button-group">
                    <button class="add-btn yellow-btn"><i class="ph ph-plus"></i> STOCK</button>
                    <button class="add-btn yellow-btn"><i class="ph ph-plus"></i> INGREDIENT</button>
                    <button class="add-btn history-btn">STOCK HISTORY</button>
                </div>
            </div>

            <section class="table-card">
                <div class="table-filters">
                    <select class="filter-select" id="stockCategoryFilter">
                        <option value="All Categories">All Categories</option>
                        <option value="Fruit">Fruit</option>
                        <option value="Dairy">Dairy</option>
                        <option value="Powder">Powder</option>
                        <option value="Toppings">Toppings</option>
                        <option value="Material">Material</option>
                    </select>
                    <select class="filter-select" id="priceSortFilter">
                        <option value="Low to High">Low to High</option>
                        <option value="High to Low">High to Low</option>
                    </select>
                </div>

            <tbody id="stockTableBody"></tbody>

                <div class="table-wrapper">
                    <table class="products-table">
                        <thead>
                            <tr>
                                <th>Ingredients</th>
                                <th>Category</th>
                                <th>Price</th>
                                <th>Sold By</th>
                                <th>Price per gram</th>
                                <th>Stock</th>
                                <th>Min Stock Level</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="stockTableBody"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <div class="modal-overlay" id="addStockModal">
        <div class="modal-container" style="max-width: 600px;">
            <header class="modal-header">
                <h2>ADD STOCK</h2>
            </header>

            <div class="modal-body">
                <div class="stock-form-grid">
                    <label class="bold-label">INGREDIENT</label>
                    <input type="text" id="newStockIngredient" placeholder="ENTER INGREDIENT NAME">

                    <label class="bold-label">CATEGORY</label>
                    <select id="newStockCategory" class="pill-input">
                        <option value="" disabled selected>SELECT CATEGORY</option>
                        <option value="Fruit">Fruit</option>
                        <option value="Dairy">Dairy</option>
                        <option value="Powder">Powder</option>
                    </select>

                    <label class="bold-label">PRICE</label>
                    <div class="inline-inputs">
                        <input type="number" id="newStockPrice" placeholder="SELLING PRICE">
                        <label class="bold-label">SOLD BY</label>
                        <input type="text" id="newStockSoldBy" placeholder="Bundle/Pack/Kg">
                    </div>

                    <label class="bold-label">PRICE PER GRAM</label>
                    <input type="text" id="newStockPPG" placeholder="PRICE PER GRAM" disabled>

                    <label class="bold-label">STOCK</label>
                    <div class="inline-inputs">
                        <input type="text" id="newStockQty" placeholder="QUANTITY">
                        <label class="bold-label">MIN STOCK LEVEL</label>
                        <input type="text" id="newStockMinLevel" placeholder="LEVEL">
                    </div>
                </div>
            </div>

            <footer class="modal-footer centered-footer">
                <button class="btn-add-stock" id="confirmAddStock">ADD STOCK</button>
                <button class="btn-modal-cancel" id="closeAddStock">CANCEL</button>
            </footer>
        </div>
    </div>

</body>
</html>
